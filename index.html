<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para una persona que quiero mucho</title>

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    background: linear-gradient(#ffd6e7, #ffffff);
    overflow-x: hidden;
    min-height: 100vh;
}

h1 { margin-top: 20px; }

#cancha {
    position: relative;
    min-height: 400px;
}

/* 🏀 CANASTA */
#aro {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
}

/* 🏀 PELOTA */
#pelota {
    width: 60px;
    position: absolute;
    bottom: 20px;
    left: 30%;
    transition: all 0.8s ease-in-out;
}

/* BOTONES */
button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    border-radius: 12px;
    border: none;
    background: #ff99cc;
    cursor: pointer;
}

#mensajeFinal {
    display: none;
    font-size: 22px;
    margin-bottom: 50px;
}

/* 🌸 FONDO DE FLORES */
#fondoFlores {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
}

.flor {
    position: absolute;
    font-size: 24px;
    animation: caer linear infinite;
}

@keyframes caer {
    from { transform: translateY(-50px); }
    to { transform: translateY(800px); }
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {

    #aro svg {
        width: 140px;
    }

    #pelota {
        width: 45px;
        left: 20%;
    }

    h1 {
        font-size: 22px;
    }

    p {
        font-size: 16px;
    }

    button {
        font-size: 16px;
        padding: 10px 18px;
    }

    #mensajeFinal {
        font-size: 18px;
    }
}
</style>

</head>

<body>

<div id="fondoFlores"></div>

<h1>🌸 Hola bondiolita 🏀</h1>
<p>Quiero que sepas que ya sos una persona especial para mi</p>

<div id="cancha">

```
<!-- 🏀 CANASTA -->
<div id="aro">
    <svg viewBox="0 0 200 150" width="200">
        <rect x="20" y="10" width="160" height="100" fill="white" stroke="black" stroke-width="4"/>
        <rect x="80" y="40" width="40" height="30" fill="none" stroke="black" stroke-width="3"/>
        <ellipse cx="100" cy="110" rx="30" ry="10" fill="none" stroke="orange" stroke-width="5"/>
    </svg>
</div>

<!-- 🏀 PELOTA -->
<img id="pelota" src="https://cdn-icons-png.flaticon.com/512/889/889455.png">
```

</div>

<button onclick="tirar()">Tirate un triple</button>

<div id="mensajeFinal">
    <p>🏀 ¡Goooooooool!</p>
    <p>No llores ok?</p>
    <p><b>10 motivos por los que te quiero 💖</b></p>

```
<ul id="lista" style="list-style: none; padding: 0;"></ul>
```

</div>

<audio id="sonido" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>

<script>
function tirar() {
    let pelota = document.getElementById("pelota");

    pelota.style.bottom = "260px";
    pelota.style.left = "50%";

    document.getElementById("sonido").play();

    setTimeout(() => {
        pelota.style.bottom = "140px";
    }, 500);

    setTimeout(() => {
        pelota.style.bottom = "110px";
    }, 900);

    setTimeout(() => {
        encestar();
    }, 1200);
}

function encestar() {
    document.getElementById("mensajeFinal").style.display = "block";
    lluviaFlores();
    mostrarLista();
}

function lluviaFlores() {
    let fondo = document.getElementById("fondoFlores");

    setInterval(() => {
        let flor = document.createElement("div");
        flor.className = "flor";
        flor.innerHTML = "🌸";
        flor.style.left = Math.random() * window.innerWidth + "px";
        flor.style.animationDuration = (Math.random() * 3 + 2) + "s";
        fondo.appendChild(flor);
    }, 200);
}

function mostrarLista() {
    const razones = [
        "1. Porque siempre que estoy con vos me pongo alegre",
        "2. Porque siento que con vos puedo ser yo mismo",
        "3. Porque nunca estuve tan enamorado de alguien",
        "4. Porque tu personalidad me encanta",
        "5. Porque sos hermosa",
        "6. Porque siempre tenes ganas de estar conmigo",
        "7. Porque desde el primer dia ya sabia que tenes q ser vos",
        "8. Porque me impulsas a entrenar y estar mejor yo",
        "9. Porque sos re tierna (aunque te haya costado)",
        "10. Porque simplemente sos vos",
        "11. Y hay muchas mas"
    ];

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    razones.forEach((razon, i) => {
        setTimeout(() => {
            let li = document.createElement("li");
            li.textContent = razon;
            li.style.opacity = "0";
            li.style.transition = "0.5s";
            lista.appendChild(li);

            setTimeout(() => {
                li.style.opacity = "1";
            }, 50);
        }, i * 500);
    });
}
</script>

</body>
</html>
